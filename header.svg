  <!-- ChatGPT -->
  <circle cx="400" cy="232" r="4" fill="#74AA9C"/>
  <text x="412" y="237" font-family="monospace" font-size="13" font-weight="bold" fill="#74AA9C">ChatGPT</text>
  <!-- separator -->
  <text x="480" y="237" font-family="monospace" font-size="13" fill="#333">·</text>
  <!-- Gemini -->
  <circle cx="500" cy="232" r="4" fill="#8E75B2"/>
  <text x="512" y="237" font-family="monospace" font-size="13" font-weight="bold" fill="#8E75B2">Gemini</text>
  <!-- separator -->
  <text x="572" y="237" font-family="monospace" font-size="13" fill="#333">·</text>
  <!-- Mistral -->
  <circle cx="592" cy="232" r="4" fill="#FF7000"/>
  <text x="604" y="237" font-family="monospace" font-size="13" font-weight="bold" fill="#FF7000">Mistral</text>
  <!-- separator -->
  <text x="672" y="237" font-family="monospace" font-size="13" fill="#333">·</text>
  <!-- DeepSeek -->
  <circle cx="692" cy="232" r="4" fill="#4D6BFF"/>
  <text x="704" y="237" font-family="monospace" font-size="13" font-weight="bold" fill="#4D6BFF">DeepSeek</text>
  <!-- separator -->
  <text x="784" y="237" font-family="monospace" font-size="13" fill="#333">·</text>
  <!-- Grok -->
  <circle cx="804" cy="232" r="4" fill="#FFFFFF"/>
  <text x="816" y="237" font-family="monospace" font-size="13" font-weight="bold" fill="#EEEEEE">Grok</text>

  <!-- Hex accent -->
  <text x="600" y="272" text-anchor="middle" font-family="monospace" font-size="10" fill="#5DCAA5" opacity="0.12" letter-spacing="1">0x47 0x45 0x54 0x4F 0x42 0x59 0x54 0x45</text>

  <!-- Tricolor stripe bottom -->
  <rect x="0" y="317" width="400" height="3" fill="#002B7F"/>
  <rect x="400" y="317" width="400" height="3" fill="#FCD116"/>
  <rect x="800" y="317" width="400" height="3" fill="#CE1126"/>

  <!-- Corner accents -->
  <rect x="0" y="3" width="50" height="2" fill="#002B7F" opacity="0.3"/>
  <rect x="0" y="3" width="2" height="50" fill="#002B7F" opacity="0.3"/>
  <rect x="1150" y="3" width="50" height="2" fill="#CE1126" opacity="0.3"/>
  <rect x="1198" y="3" width="2" height="50" fill="#CE1126" opacity="0.3"/>
  <rect x="0" y="315" width="50" height="2" fill="#CE1126" opacity="0.3"/>
  <rect x="0" y="267" width="2" height="50" fill="#CE1126" opacity="0.3"/>
  <rect x="1150" y="315" width="50" height="2" fill="#002B7F" opacity="0.3"/>
  <rect x="1198" y="267" width="2" height="50" fill="#002B7F" opacity="0.3"/>
