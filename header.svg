    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/><line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/><line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/><line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/><line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="900" y1="0" x2="900" y2="320"/><line x1="1000" y1="0" x2="1000" y2="320"/>
    <line x1="1100" y1="0" x2="1100" y2="320"/>
  </g>

  <!-- Binary watermark left -->
  <g opacity="0.05" fill="#5DCAA5" font-family="monospace" font-size="11">
    <text x="20" y="50">01000111 01000101</text>
    <text x="20" y="66">01010100 01001111</text>
    <text x="20" y="82">01000010 01011001</text>
    <text x="20" y="98">01010100 01000101</text>
    <text x="20" y="114">01001000 01100101</text>
    <text x="20" y="130">01101100 01101100</text>
    <text x="20" y="146">01101111 00100000</text>
    <text x="20" y="162">01010111 01101111</text>
  </g>

  <!-- Binary watermark right -->
  <g opacity="0.05" fill="#5DCAA5" font-family="monospace" font-size="11" text-anchor="end">
    <text x="1180" y="140">10110001 11001010</text>
    <text x="1180" y="156">01011010 10010011</text>
    <text x="1180" y="172">11100101 00110110</text>
    <text x="1180" y="188">01001101 10101100</text>
    <text x="1180" y="204">11010010 01100111</text>
    <text x="1180" y="220">10001011 11010100</text>
    <text x="1180" y="236">01110010 10011001</text>
  </g>

