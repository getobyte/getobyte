<svg width="1200" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="300" fill="#0D1117"/>

  <!-- Tricolor stripe top (3 solid rects, no gradient) -->
  <rect x="0" y="0" width="400" height="3" fill="#002B7F"/>
  <rect x="400" y="0" width="400" height="3" fill="#FCD116"/>
  <rect x="800" y="0" width="400" height="3" fill="#CE1126"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#5DCAA5" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/><line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/><line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/><line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="900" y1="0" x2="900" y2="300"/><line x1="1000" y1="0" x2="1000" y2="300"/>
    <line x1="1100" y1="0" x2="1100" y2="300"/>
  </g>

  <!-- Binary watermark left -->
  <g opacity="0.06" fill="#5DCAA5" font-family="monospace" font-size="11">
    <text x="20" y="50">01000111 01000101</text>
    <text x="20" y="66">01010100 01001111</text>
    <text x="20" y="82">01000010 01011001</text>
    <text x="20" y="98">01010100 01000101</text>
    <text x="20" y="114">01001000 01100101</text>
    <text x="20" y="130">01101100 01101100</text>
    <text x="20" y="146">01101111 00100000</text>
    <text x="20" y="162">01010111 01101111</text>
    <text x="20" y="178">01110010 01101100</text>
    <text x="20" y="194">01100100 00100001</text>
  </g>

  <!-- Binary watermark right -->
  <g opacity="0.06" fill="#5DCAA5" font-family="monospace" font-size="11" text-anchor="end">
    <text x="1180" y="110">10110001 11001010</text>
    <text x="1180" y="126">01011010 10010011</text>
    <text x="1180" y="142">11100101 00110110</text>
    <text x="1180" y="158">01001101 10101100</text>
    <text x="1180" y="174">11010010 01100111</text>
    <text x="1180" y="190">10001011 11010100</text>
    <text x="1180" y="206">01110010 10011001</text>
    <text x="1180" y="222">11001010 01010110</text>
  </g>

  <!-- Circuit traces -->
  <g stroke="#5DCAA5" fill="none" opacity="0.1" stroke-width="1">
    <path d="M0 200 H80 V160 H140"/>
    <path d="M0 230 H50 V180 H120 V200 H180"/>
    <path d="M1200 100 H1120 V140 H1060"/>
    <path d="M1200 130 H1140 V170 H1080 V150 H1020"/>
  </g>
  <g fill="#5DCAA5" opacity="0.15">
    <circle cx="140" cy="160" r="3"/><circle cx="180" cy="200" r="3"/>
    <circle cx="1060" cy="140" r="3"/><circle cx="1020" cy="150" r="3"/>
  </g>

  <!-- Title: GetoByte - each letter solid color, no gradient -->
  <text x="395" y="125" font-family="monospace" font-size="62" font-weight="bold" fill="#002B7F">G</text>
  <text x="434" y="125" font-family="monospace" font-size="62" font-weight="bold" fill="#3B8BD4">e</text>
  <text x="470" y="125" font-family="monospace" font-size="62" font-weight="bold" fill="#3B8BD4">t</text>
  <text x="506" y="125" font-family="monospace" font-size="62" font-weight="bold" fill="#FCD116">o</text>
  <text x="542" y="125" font-family="monospace" font-size="62" font-weight="bold" fill="#FCD116">B</text>
  <text x="580" y="125" font-family="monospace" font-size="62" font-weight="bold" fill="#FCD116">y</text>
  <text x="616" y="125" font-family="monospace" font-size="62" font-weight="bold" fill="#CE1126">t</text>
  <text x="652" y="125" font-family="monospace" font-size="62" font-weight="bold" fill="#CE1126">e</text>

  <!-- Dots flanking title -->
  <circle cx="382" cy="110" r="4" fill="#002B7F" opacity="0.7"/>
  <circle cx="692" cy="110" r="4" fill="#CE1126" opacity="0.7"/>

  <!-- Subtitle -->
  <text x="600" y="165" text-anchor="middle" font-family="monospace" font-size="16" fill="#9FE1CB" opacity="0.8" letter-spacing="8">DACIAN CODE · BUILD · SHIP</text>

  <!-- Tagline -->
  <text x="600" y="200" text-anchor="middle" font-family="monospace" font-size="13" fill="#888888" letter-spacing="2">full-stack developer · homelab architect · AI enthusiast</text>

  <!-- Hex accent -->
  <text x="600" y="235" text-anchor="middle" font-family="monospace" font-size="10" fill="#5DCAA5" opacity="0.15" letter-spacing="1">0x47 0x45 0x54 0x4F 0x42 0x59 0x54 0x45</text>

  <!-- Tricolor stripe bottom -->
  <rect x="0" y="297" width="400" height="3" fill="#002B7F"/>
  <rect x="400" y="297" width="400" height="3" fill="#FCD116"/>
  <rect x="800" y="297" width="400" height="3" fill="#CE1126"/>

  <!-- Corner accents -->
  <rect x="0" y="3" width="50" height="2" fill="#002B7F" opacity="0.3"/>
  <rect x="0" y="3" width="2" height="50" fill="#002B7F" opacity="0.3"/>
  <rect x="1150" y="3" width="50" height="2" fill="#CE1126" opacity="0.3"/>
  <rect x="1198" y="3" width="2" height="50" fill="#CE1126" opacity="0.3"/>
  <rect x="0" y="295" width="50" height="2" fill="#CE1126" opacity="0.3"/>
  <rect x="0" y="247" width="2" height="50" fill="#CE1126" opacity="0.3"/>
  <rect x="1150" y="295" width="50" height="2" fill="#002B7F" opacity="0.3"/>
  <rect x="1198" y="247" width="2" height="50" fill="#002B7F" opacity="0.3"/>
</svg>
