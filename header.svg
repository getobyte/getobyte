  <g stroke="#5DCAA5" fill="none" opacity="0.08" stroke-width="1">
    <path d="M0 210 H60 V170 H120"/>
    <path d="M0 240 H40 V190 H100 V210 H160"/>
    <path d="M1200 110 H1140 V150 H1080"/>
    <path d="M1200 140 H1150 V180 H1090 V160 H1040"/>
  </g>
  <g fill="#5DCAA5" opacity="0.12">
    <circle cx="120" cy="170" r="3"/><circle cx="160" cy="210" r="3"/>
    <circle cx="1080" cy="150" r="3"/><circle cx="1040" cy="160" r="3"/>
  </g>

  <!-- Main title: GetoByte - big, centered -->
  <text x="418" y="120" font-family="monospace" font-size="76" font-weight="bold" fill="#002B7F">G</text>
  <text x="464" y="120" font-family="monospace" font-size="76" font-weight="bold" fill="#3B8BD4">e</text>
  <text x="510" y="120" font-family="monospace" font-size="76" font-weight="bold" fill="#3B8BD4">t</text>
  <text x="556" y="120" font-family="monospace" font-size="76" font-weight="bold" fill="#FCD116">o</text>
  <text x="600" y="120" font-family="monospace" font-size="76" font-weight="bold" fill="#FCD116">B</text>
  <text x="646" y="120" font-family="monospace" font-size="76" font-weight="bold" fill="#FCD116">y</text>
  <text x="692" y="120" font-family="monospace" font-size="76" font-weight="bold" fill="#CE1126">t</text>
  <text x="738" y="120" font-family="monospace" font-size="76" font-weight="bold" fill="#CE1126">e</text>

  <!-- Subtitle -->
  <text x="600" y="162" text-anchor="middle" font-family="monospace" font-size="16" fill="#9FE1CB" opacity="0.85" letter-spacing="8">DACIAN CODE · BUILD · SHIP</text>

  <!-- AI tagline -->
  <text x="600" y="200" text-anchor="middle" font-family="monospace" font-size="13" fill="#888888" letter-spacing="2">everything I build is AI-powered</text>

  <!-- AI brand dots + names (each separate for GitHub safety) -->
  <!-- Claude -->
  <circle cx="310" cy="232" r="4" fill="#D4A27F"/>
  <text x="322" y="237" font-family="monospace" font-size="13" font-weight="bold" fill="#D4A27F">Claude</text>
  <!-- separator -->
